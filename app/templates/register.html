{% extends 'base.html' %}
{% block content %}
<section class="auth-wrap">
  <article class="card auth-card">
    <h1>Registrazione</h1>
    <p class="muted">Crea il tuo account personale MyFit Journal.</p>

    {% if error %}
      <p class="error-text">{{ error }}</p>
    {% endif %}

    <form method="post" action="/register" class="form-grid">
      <label>Nome completo
        <input type="text" name="full_name" required placeholder="Mario Rossi" />
      </label>
      <label>Sesso
        <select name="sex" required>
          <option value="male">Uomo</option>
          <option value="female">Donna</option>
        </select>
      </label>
      <label>Email
        <input type="email" name="email" required placeholder="nome@email.it" />
      </label>
      <label>Password
        <input type="password" name="password" required minlength="8" placeholder="Almeno 8 caratteri" />
      </label>
      <button type="submit">Crea account</button>
    </form>

    <p class="auth-footer">Hai gia un account? <a href="/login">Vai al login</a></p>
  </article>
</section>
{% endblock %}
